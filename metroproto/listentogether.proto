syntax = "proto3";

package com.ragg.music.listentogether.proto;

option java_package = "com.ragg.music.listentogether.proto";
option java_outer_classname = "Listentogether";

message Envelope {
  string type = 1;
  bytes payload = 2;
  bool compressed = 3;
}

message TrackInfo {
  string id = 1;
  string title = 2;
  string artist = 3;
  string album = 4;
  int64 duration = 5;
  string thumbnail = 6;
  string suggestedBy = 7;
}

message UserInfo {
  string userId = 1;
  string username = 2;
  bool isHost = 3;
  bool isConnected = 4;
}

message RoomState {
  string roomCode = 1;
  string hostId = 2;
  repeated UserInfo users = 3;
  TrackInfo currentTrack = 4;
  bool isPlaying = 5;
  int64 position = 6;
  int64 lastUpdate = 7;
  float volume = 8;
  repeated TrackInfo queue = 9;
}

message CreateRoomPayload {
  string username = 1;
}

message JoinRoomPayload {
  string roomCode = 1;
  string username = 2;
}

message ApproveJoinPayload {
  string userId = 1;
}

message RejectJoinPayload {
  string userId = 1;
  string reason = 2;
}

message PlaybackActionPayload {
  string action = 1;
  int64 position = 2;
  bool insertNext = 3;
  float volume = 4;
  int64 serverTime = 5;
  string trackId = 6;
  TrackInfo trackInfo = 7;
  string queueTitle = 8;
  repeated TrackInfo queue = 9;
}

message BufferReadyPayload {
  string trackId = 1;
}

message KickUserPayload {
  string userId = 1;
  string reason = 2;
}

message SuggestTrackPayload {
  TrackInfo trackInfo = 1;
}

message ApproveSuggestionPayload {
  string suggestionId = 1;
}

message RejectSuggestionPayload {
  string suggestionId = 1;
  string reason = 2;
}

message ReconnectPayload {
  string sessionToken = 1;
}

message TransferHostPayload {
  string newHostId = 1;
}

message RoomCreatedPayload {
  string roomCode = 1;
  string userId = 2;
  string sessionToken = 3;
}

message JoinRequestPayload {
  string userId = 1;
  string username = 2;
}

message JoinApprovedPayload {
  string roomCode = 1;
  string userId = 2;
  string sessionToken = 3;
  RoomState state = 4;
}

message JoinRejectedPayload {
  string reason = 1;
}

message UserJoinedPayload {
  string userId = 1;
  string username = 2;
}

message UserLeftPayload {
  string userId = 1;
  string username = 2;
}

message BufferWaitPayload {
  string trackId = 1;
  repeated string waitingFor = 2;
}

message BufferCompletePayload {
  string trackId = 1;
}

message ErrorPayload {
  string code = 1;
  string message = 2;
}

message HostChangedPayload {
  string newHostId = 1;
  string newHostName = 2;
}

message KickedPayload {
  string reason = 1;
}

message SyncStatePayload {
  TrackInfo currentTrack = 1;
  bool isPlaying = 2;
  int64 position = 3;
  int64 lastUpdate = 4;
  repeated TrackInfo queue = 5;
  float volume = 6;
}

message ReconnectedPayload {
  string roomCode = 1;
  string userId = 2;
  RoomState state = 3;
  bool isHost = 4;
}

message UserReconnectedPayload {
  string userId = 1;
  string username = 2;
}

message UserDisconnectedPayload {
  string userId = 1;
  string username = 2;
}

message SuggestionReceivedPayload {
  string suggestionId = 1;
  string fromUserId = 2;
  string fromUsername = 3;
  TrackInfo trackInfo = 4;
}

message SuggestionApprovedPayload {
  string suggestionId = 1;
  TrackInfo trackInfo = 2;
}

message SuggestionRejectedPayload {
  string suggestionId = 1;
  string reason = 2;
}

